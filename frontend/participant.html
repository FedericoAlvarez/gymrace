<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Participant — GymRace Amsterdam 2026</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<header>
  <a class="back-link" id="back-link" href="/">← Back</a>
  <h1>GymRace <span>Amsterdam</span> 2026</h1>
  <span class="header-sub">Participant Detail</span>
</header>

<div id="loading" style="text-align:center;padding:80px;color:var(--gray-400)">Loading…</div>

<div id="page" style="display:none">

  <!-- Overview -->
  <div class="participant-overview">
    <div class="overview-hero">
      <div id="hero-flag" class="hero-flag"></div>
      <div class="hero-info">
        <h2 id="hero-name"></h2>
        <div id="hero-meta" class="hero-meta"></div>
      </div>
    </div>
    <div id="overview-stats" class="overview-stats"></div>
  </div>

  <div id="penalty-banner"></div>

  <!-- Tabs -->
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="total">Total</button>
    <button class="tab-btn" data-tab="runs">Runs</button>
    <button class="tab-btn" data-tab="workouts">Workouts</button>
    <button class="tab-btn" data-tab="splits">Splits</button>
  </div>

  <div class="tab-content">
    <div id="tab-total"   class="tab-panel active"></div>
    <div id="tab-runs"    class="tab-panel"></div>
    <div id="tab-workouts" class="tab-panel"></div>
    <div id="tab-splits"  class="tab-panel"></div>
  </div>

</div>

<script src="participant.js"></script>
</body>
</html>
