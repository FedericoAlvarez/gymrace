<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GymRace Results</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Roboto+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<header>
  <a class="back-link" href="/">← All races</a>
  <h1 id="race-title">GymRace <span id="race-title-accent">Results</span></h1>
  <span class="header-sub" id="race-subtitle"></span>
</header>

<div class="filters">
  <span class="filter-label">Filter</span>

  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" id="search" placeholder="Search by name…" autocomplete="off">
  </div>

  <select id="filter-race">
    <option value="">All categories</option>
    <optgroup label="Solo">
      <option value="1-M">Men Solo</option>
      <option value="1-W">Women Solo</option>
      <option value="2-M">Men Heavy Solo</option>
      <option value="2-W">Women Heavy Solo</option>
    </optgroup>
    <optgroup label="Buddies">
      <option value="3-M">Men Buddies</option>
      <option value="3-W">Women Buddies</option>
      <option value="3-X">Mixed Buddies</option>
      <option value="4-M">Men Heavy Buddies</option>
      <option value="4-W">Women Heavy Buddies</option>
      <option value="4-X">Mixed Heavy Buddies</option>
    </optgroup>
  </select>

  <select id="filter-status">
    <option value="">All statuses</option>
    <option value="Finish">Finished</option>
    <option value="DNF">DNF</option>
    <option value="DSQ">DSQ</option>
  </select>

  <span class="result-count" id="result-count"></span>
</div>

<div class="table-wrap">
  <div id="loading">Loading results…</div>
  <table id="results-table" style="display:none">
    <thead>
      <tr>
        <th data-col="pos" class="sort-asc">Pos</th>
        <th data-col="pos_cat">Cat pos</th>
        <th data-col="name">Name</th>
        <th data-col="country">Country</th>
        <th data-col="race">Category</th>
        <th data-col="spl1">Workouts</th>
        <th data-col="spl3">Running</th>
        <th data-col="time">Total time</th>
        <th data-col="fin">Status</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div id="empty" class="empty" style="display:none">
    <strong>No results found</strong>
    <p>Try adjusting your search or filters.</p>
  </div>
</div>

<!-- Comparison bar -->
<div id="compare-bar">
  <div class="cbar-slots">
    <div class="cbar-slot" id="cbar-slot-0">
      <span class="cbar-label">Select a participant</span>
    </div>
    <div class="cbar-vs">vs</div>
    <div class="cbar-slot" id="cbar-slot-1">
      <span class="cbar-label">Select a participant</span>
    </div>
  </div>
  <div class="cbar-actions">
    <button class="btn-clear" id="btn-clear-compare">Clear</button>
    <a class="btn-go-compare" id="btn-go-compare" href="#">Compare →</a>
  </div>
</div>

<script src="/race.js"></script>
</body>
</html>
