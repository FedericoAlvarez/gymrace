<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compare — GymRace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Roboto+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<header>
  <a class="back-link" id="back-link" href="/">← Back to results</a>
  <h1>GymRace <span>Compare</span></h1>
  <span class="header-sub" id="race-subtitle"></span>
</header>

<div id="loading" style="text-align:center;padding:80px;color:var(--text-3)">Loading…</div>

<div id="page" style="display:none">

  <!-- Hero: both participants side by side -->
  <div class="cmp-hero">
    <div class="cmp-hero-side" id="cmp-hero-0"></div>
    <div class="cmp-hero-divider">vs</div>
    <div class="cmp-hero-side" id="cmp-hero-1"></div>
  </div>

  <!-- Summary stats row -->
  <div class="cmp-stats-row" id="cmp-stats"></div>

  <!-- Segment-by-segment comparison -->
  <div class="cmp-segments-wrap">
    <h3 class="detail-section-title" style="padding: 0 24px 12px">Split comparison</h3>
    <div id="cmp-segments"></div>
  </div>

</div>

<script src="/compare.js"></script>
</body>
</html>
